<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Gateway — DB Test (Supabase)</title>
<meta name="robots" content="noindex">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #2d3748; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
  .test-banner { background: #fffbea; border: 2px solid #f6c343; color: #7a5b00; font-weight: 600; text-align: center; }
  h1 { font-size: 2rem; margin-bottom: 6px; }
  .subtitle { color: #718096; }
  h2 { font-size: 1.4rem; margin-bottom: 18px; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  select { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; background: #fff; }
  select:focus { outline: none; border-color: #667eea; }
  select:disabled { background: #f7fafc; color: #a0aec0; cursor: not-allowed; }
  button { background: #667eea; color: #fff; border: none; padding: 14px 28px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s; }
  button:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,.4); }
  button:disabled { background: #cbd5e0; cursor: not-allowed; transform: none; box-shadow: none; }
  .results { display: none; } .results.active { display: block; }
  .banner { background: #f7fafc; border-left: 4px solid #667eea; padding: 18px 20px; margin-bottom: 22px; border-radius: 8px; }
  .banner h3 { margin-bottom: 4px; } .banner .meta { color: #718096; font-size: .95rem; }
  .city-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .race { margin-bottom: 22px; }
  .race-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: #4a5568; display: inline-flex; align-items: center; gap: 8px; }
  .race-title.clickable { cursor: pointer; color: #667eea; }
  .race-title.clickable:hover { text-decoration: underline; }
  .tag { font-size: .68rem; font-weight: 700; background: #e9d8fd; color: #6b46c1; padding: 2px 8px; border-radius: 10px; letter-spacing: .02em; }
  .candidates { display: grid; gap: 12px; }
  .candidate-card { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 8px; padding: 16px; cursor: pointer; transition: all .2s; }
  .candidate-card:hover { border-color: #667eea; transform: translateX(4px); box-shadow: 0 4px 12px rgba(102,126,234,.2); }
  .candidate-name { font-weight: 600; font-size: 1.05rem; }
  .candidate-party { color: #718096; font-size: .9rem; margin: 4px 0 10px; }
  .links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link { display: inline-flex; align-items: center; gap: 4px; color: #667eea; text-decoration: none; font-size: .82rem; padding: 4px 10px; background: #fff; border-radius: 6px; border: 1px solid #e2e8f0; transition: all .15s; }
  .link:hover { background: #667eea; color: #fff; border-color: #667eea; }
  .empty { text-align: center; padding: 6px 0 18px; color: #718096; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; padding: 20px; }
  .modal.active { display: flex; align-items: center; justify-content: center; }
  .modal-content { background: #fff; border-radius: 12px; padding: 30px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .close { position: absolute; top: 16px; right: 16px; font-size: 1.5rem; background: none; border: none; color: #718096; cursor: pointer; padding: 4px 10px; }
  .modal h3 { font-size: 1.5rem; margin-bottom: 6px; }
  .modal .party { color: #667eea; font-weight: 600; margin-bottom: 16px; }
  .modal p { line-height: 1.6; color: #4a5568; margin-bottom: 14px; }
  .modal h4 { margin: 18px 0 8px; font-size: .95rem; color: #2d3748; }
  @media (max-width: 640px) { .input-group { grid-template-columns: 1fr; } h1 { font-size: 1.5rem; } }
  .error { color: #c53030; }
</style>
</head>
<body>
<div class="container">
  <div class="card test-banner">
    ⚠️ DB TEST PAGE — reads from Supabase, not from index.html's built-in data. Not linked from the live site.
  </div>
  <div class="card">
    <h1>🗳️ Civic Gateway</h1>
    <p class="subtitle">Same UI as the live site — data loaded from a database instead of the page itself.</p>
  </div>
  <div class="card">
    <h2>Choose Your Location</h2>
    <div class="input-group">
      <div><label for="state">State</label><select id="state" disabled onchange="onStateChange()"><option value="">Loading…</option></select></div>
      <div><label for="city">City / Jurisdiction</label><select id="city" disabled onchange="onCityChange()"><option value="">Select a state first</option></select></div>
    </div>
    <button id="findBtn" disabled onclick="findBallot()">Show My Ballot &amp; Officials</button>
  </div>
  <div class="card results" id="results"></div>
</div>
<div class="modal" id="modal"><div class="modal-content"><button class="close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>

<script type="module">
/* ============================================================
   CONFIG — fill these in from your Supabase project settings
   (Project Settings → API → Project URL / anon public key).
   The anon key is safe to expose here: Row Level Security in
   schema.sql only allows it to read, never write.
   ============================================================ */
const SUPABASE_URL = "https://juloefnbmbyhzdzyijug.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bG9lZm5ibWJ5aHpkenlpanVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzkzNDUsImV4cCI6MjA5OTQ1NTM0NX0.bK_BP0ckOy_aJk-CPFHelEfkXTirCyowPIpEIVHXGso";

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const STATE_NAMES = { MO: "Missouri", IL: "Illinois" };
let BALLOT_DATA = {};
let CURRENT = null;

async function loadData() {
  if (SUPABASE_URL.includes("YOUR-PROJECT-REF") || SUPABASE_ANON_KEY.includes("YOUR-ANON")) {
    showLoadError("Fill in SUPABASE_URL and SUPABASE_ANON_KEY at the top of db-test.html's <script> block first.");
    return;
  }

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data, error } = await supabase
    .from("jurisdictions")
    .select(`
      *,
      officials(*),
      elections(
        *,
        races(
          *,
          candidates(
            *,
            resources:resources_candidate_id_fkey(*)
          ),
          resources:resources_race_id_fkey(*)
        )
      )
    `);

  if (error) {
    showLoadError(`Supabase query failed: ${error.message}. Did you run schema.sql and seed.sql?`);
    return;
  }

  BALLOT_DATA = {};
  const today = new Date().toISOString().slice(0, 10);

  (data || []).forEach(j => {
    const key = `${j.name}, ${j.state}`;
    const officials = (j.officials || [])
      .slice()
      .sort((a, b) => a.sort_order - b.sort_order)
      .map(o => ({ name: o.name, office: o.office, party: o.party, term: o.term, bio: o.bio, email: o.email, phone: o.phone, website: o.website, twitter: o.twitter, facebook: o.facebook }));

    const upcoming = (j.elections || [])
      .filter(e => e.election_date >= today)
      .sort((a, b) => a.election_date.localeCompare(b.election_date))[0];

    let upcomingElection = null;
    if (upcoming) {
      upcomingElection = {
        name: upcoming.name,
        date: upcoming.election_date,
        races: (upcoming.races || []).slice().sort((a, b) => a.sort_order - b.sort_order).map(r => ({
          title: r.title,
          description: r.description,
          resources: {
            debates: (r.resources || []).filter(x => x.kind === "debate").map(x => ({ title: x.title, url: x.url })),
            info: (r.resources || []).filter(x => x.kind === "info").map(x => ({ title: x.title, url: x.url }))
          },
          candidates: (r.candidates || []).slice().sort((a, b) => a.sort_order - b.sort_order).map(c => ({
            name: c.name, party: c.party, bio: c.bio, email: c.email, phone: c.phone, website: c.website, twitter: c.twitter, facebook: c.facebook,
            interviews: (c.resources || []).filter(x => x.kind === "interview").map(x => ({ title: x.title, url: x.url }))
          }))
        }))
      };
    }

    BALLOT_DATA[key] = {
      county: j.county,
      cityWebsite: j.city_website,
      citySocial: { twitter: j.twitter, facebook: j.facebook, instagram: j.instagram, youtube: j.youtube },
      nextElectionNote: j.next_election_note,
      upcomingElection,
      currentOfficials: officials
    };
  });

  populateStates();
}

function showLoadError(msg) {
  document.getElementById("state").innerHTML = '<option value="">Failed to load</option>';
  const results = document.getElementById("results");
  results.classList.add("active");
  results.innerHTML = `<p class="error">${msg}</p>`;
}

function citiesByState() { const m = {}; Object.keys(BALLOT_DATA).forEach(k => { const s = k.split(", ")[1]; (m[s] = m[s] || []).push(k); }); return m; }
function populateStates() {
  const sel = document.getElementById("state");
  sel.disabled = false; sel.innerHTML = '<option value="">Select a state…</option>';
  Object.keys(citiesByState()).sort().forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = STATE_NAMES[s] || s; sel.appendChild(o); });
}
window.onStateChange = function() {
  const st = document.getElementById("state").value, citySel = document.getElementById("city");
  document.getElementById("findBtn").disabled = true; citySel.innerHTML = "";
  if (!st) { citySel.disabled = true; citySel.innerHTML = '<option value="">Select a state first</option>'; return; }
  citySel.disabled = false; citySel.innerHTML = '<option value="">Select a city…</option>';
  citiesByState()[st].sort().forEach(k => { const o = document.createElement("option"); o.value = k; o.textContent = k.split(", ")[0]; citySel.appendChild(o); });
};
window.onCityChange = function() { document.getElementById("findBtn").disabled = !document.getElementById("city").value; };

window.findBallot = function() {
  const key = document.getElementById("city").value, data = BALLOT_DATA[key];
  if (!data) return; CURRENT = data;
  const results = document.getElementById("results");
  if (data.upcomingElection) {
    const e = data.upcomingElection;
    results.innerHTML = `<div class="banner"><h3>${e.name}</h3><p class="meta">📅 ${e.date} · ${key}</p>${cityLinksRow(data)}</div>` + e.races.map(renderRace).join("");
  } else {
    results.innerHTML = `<div class="banner"><h3>No election currently scheduled</h3><p class="meta">${key}${data.county ? " · " + data.county : ""}</p>${cityLinksRow(data)}</div>`
      + (data.nextElectionNote ? `<div class="empty"><p>${data.nextElectionNote}</p></div>` : "")
      + `<div class="race"><div class="race-title">Your Current Elected Officials</div><div class="candidates">${(data.currentOfficials || []).map(renderCandidate).join("")}</div></div>`;
  }
  results.classList.add("active"); results.scrollIntoView({ behavior: "smooth" });
};

function cityLinksRow(d) {
  const s = d.citySocial || {}; let o = "";
  if (d.cityWebsite) o += `<a class="link" href="${d.cityWebsite}" target="_blank" rel="noopener">🌐 City Website</a>`;
  if (s.twitter)   o += `<a class="link" href="https://twitter.com/${s.twitter}" target="_blank" rel="noopener">𝕏 @${s.twitter}</a>`;
  if (s.facebook)  o += `<a class="link" href="https://facebook.com/${s.facebook}" target="_blank" rel="noopener">📘 Facebook</a>`;
  if (s.instagram) o += `<a class="link" href="https://instagram.com/${s.instagram}" target="_blank" rel="noopener">📷 Instagram</a>`;
  if (s.youtube)   o += `<a class="link" href="${s.youtube}" target="_blank" rel="noopener">▶️ YouTube</a>`;
  return o ? `<div class="city-links">${o}</div>` : "";
}

function renderRace(race, i) {
  const hasResources = race.resources && ((race.resources.debates||[]).length || (race.resources.info||[]).length);
  const titleHtml = hasResources
    ? `<div class="race-title clickable" onclick="openRaceInfo(${i})">${race.title} <span class="tag">▶ DEBATES &amp; INFO</span></div>`
    : `<div class="race-title">${race.title}</div>`;
  return `<div class="race">${titleHtml}${race.description ? `<p class="meta" style="margin-bottom:10px">${race.description}</p>` : ""}<div class="candidates">${race.candidates.map(renderCandidate).join("")}</div></div>`;
}

function renderCandidate(c) {
  return `<div class="candidate-card" onclick='openModal(${JSON.stringify(c).replace(/'/g, "&apos;")})'><div class="candidate-name">${c.name}</div><div class="candidate-party">${c.office ? c.office + " · " : ""}${c.party || ""}</div><div class="links">${contactLinks(c)}</div></div>`;
}

function contactLinks(c) {
  let o = ""; const stop = 'onclick="event.stopPropagation()" target="_blank" rel="noopener"';
  if (c.website)  o += `<a class="link" href="${c.website}" ${stop}>🌐 Website</a>`;
  if (c.email)    o += `<a class="link" href="mailto:${c.email}" onclick="event.stopPropagation()">✉️ Email</a>`;
  if (c.phone)    o += `<a class="link" href="tel:${c.phone.replace(/[^0-9]/g,'')}" onclick="event.stopPropagation()">📞 ${c.phone}</a>`;
  if (c.twitter)  o += `<a class="link" href="https://twitter.com/${c.twitter.replace('@','')}" ${stop}>𝕏 ${c.twitter}</a>`;
  if (c.facebook) o += `<a class="link" href="https://facebook.com/${c.facebook}" ${stop}>📘 Facebook</a>`;
  return o;
}

window.openModal = function(c) {
  let interviews = "";
  if (c.interviews && c.interviews.length) interviews = `<h4>Interviews &amp; coverage</h4><div class="links">${c.interviews.map(v => `<a class="link" href="${v.url}" target="_blank" rel="noopener">🎤 ${v.title}</a>`).join("")}</div>`;
  document.getElementById("modalBody").innerHTML =
    `<h3>${c.name}</h3><div class="party">${c.office || ""}${c.party ? " · " + c.party : ""}${c.term ? " · " + c.term : ""}</div>`
    + (c.bio ? `<p>${c.bio}</p>` : "")
    + `<h4>Contact &amp; links</h4><div class="links">${contactLinks(c) || '<span style="color:#a0aec0;font-size:.9rem">No links available</span>'}</div>`
    + interviews;
  document.getElementById("modal").classList.add("active");
};

window.openRaceInfo = function(i) {
  const race = CURRENT.upcomingElection.races[i], r = race.resources || {};
  const sec = (label, arr, icon) => (arr && arr.length) ? `<h4>${label}</h4><div class="links">${arr.map(x => `<a class="link" href="${x.url}" target="_blank" rel="noopener">${icon} ${x.title}</a>`).join("")}</div>` : "";
  document.getElementById("modalBody").innerHTML =
    `<h3>${race.title}</h3><div class="party">Ballot item · debates &amp; information</div>`
    + sec("Debate &amp; forum videos", r.debates, "▶️")
    + sec("Voter information", r.info, "📄");
  document.getElementById("modal").classList.add("active");
};

window.closeModal = function() { document.getElementById("modal").classList.remove("active"); };
document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });

loadData();
</script>
</body>
</html>
